name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Install Playwright Chromium
        shell: pwsh
        run: |
          if (Test-Path ".playwright-browsers") {
            Remove-Item -Recurse -Force ".playwright-browsers"
          }
          $env:PLAYWRIGHT_BROWSERS_PATH = Join-Path $PWD ".playwright-browsers"
          python -m playwright install --only-shell chromium

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          $env:PLAYWRIGHT_BROWSERS_PATH = Join-Path $PWD ".playwright-browsers"
          python -m PyInstaller --noconfirm --clean xlsx2files_gui.spec
          if (-not (Test-Path "dist\Excel订单素材下载工具.exe")) {
            throw "EXE not found after build"
          }

      - name: Prepare customer package
        shell: pwsh
        run: |
          Copy-Item -Force "CUSTOMER_GUIDE.txt" "dist\客户使用说明.txt"
          $exe = "dist\Excel订单素材下载工具.exe"
          $hash = (Get-FileHash -Algorithm SHA256 $exe).Hash
          Set-Content -Encoding ascii -Path "dist\SHA256.txt" -Value "$hash  Excel订单素材下载工具.exe"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Excel订单素材下载工具-windows
          path: |
            dist/Excel订单素材下载工具.exe
            dist/客户使用说明.txt
            dist/SHA256.txt
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Excel订单素材下载工具.exe
            dist/客户使用说明.txt
            dist/SHA256.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
